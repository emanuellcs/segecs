version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: segecs_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: segecs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: segecs_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=segecs_db
      - DB_PASSWORD=password123
      - DB_PORT=5432
      - JWT_SECRET=sua_chave_secreta_aqui
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    container_name: segecs_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
